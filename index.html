<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval' blob:; connect-src * data: blob:; img-src * data: blob:; style-src * 'unsafe-inline'; font-src * data:;">
    <title>BiblioShare - Biblioteca Virtual Completa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e; --secondary: #16213e; --accent: #e94560;
            --accent-light: #ff6b6b; --success: #06d6a0; --purple: #667eea;
            --pink: #f093fb; --bg: #faf9f6; --card-bg: #ffffff;
            --text: #2c3e50; --text-light: #7f8c8d; --border: #e0e0e0;
            --warning: #f59e0b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }

        @keyframes slideUpBounce { 0%{opacity:0;transform:translateY(30px)} 60%{transform:translateY(-5px)} 100%{opacity:1;transform:translateY(0)} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes moveGrid { 0%{transform:translate(0,0)} 100%{transform:translate(30px,30px)} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes slideInShake { 0%{opacity:0;transform:translateX(-20px)} 60%{transform:translateX(5px)} 100%{opacity:1;transform:translateX(0)} }
        @keyframes spin { to{transform:rotate(360deg)} }
        @keyframes modalIn { 0%{opacity:0;transform:scale(0.85) translateY(20px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @keyframes blink { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.15);opacity:0.7} }

        .loading-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg,#667eea,#764ba2,#f093fb); color:white; gap:1.5rem; }
        .loading-spinner { width:60px; height:60px; border:5px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; }
        .loading-text { font-size:1.3rem; font-weight:600; opacity:0.9; }

        .login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%); padding:2rem; position:relative; overflow:hidden; }
        .login-screen::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle,rgba(255,255,255,0.05) 1px,transparent 1px); background-size:30px 30px; animation:moveGrid 20s linear infinite; }
        .login-box { background:rgba(255,255,255,0.95); backdrop-filter:blur(20px); padding:3rem 2.5rem; border-radius:24px; box-shadow:0 30px 80px rgba(0,0,0,0.3); width:100%; max-width:480px; position:relative; animation:slideUpBounce 0.6s cubic-bezier(0.68,-0.55,0.265,1.55); }
        .login-logo { text-align:center; margin-bottom:2rem; animation:float 3s ease-in-out infinite; }
        .login-logo-icon { font-size:4rem; margin-bottom:0.5rem; }
        .login-title { font-family:'Crimson Pro',serif; font-size:2.8rem; text-align:center; margin-bottom:0.5rem; background:linear-gradient(135deg,var(--primary),var(--accent),#764ba2); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; font-weight:700; }
        .login-subtitle { text-align:center; color:var(--text-light); margin-bottom:2.5rem; font-size:1.1rem; font-weight:500; }
        .form-group { margin-bottom:1.5rem; }
        .form-label { display:block; margin-bottom:0.5rem; font-weight:600; color:var(--text); font-size:0.95rem; }
        .form-input { width:100%; padding:1rem 1.25rem; border:2px solid var(--border); border-radius:12px; font-size:1rem; transition:all 0.3s ease; font-family:'Inter',sans-serif; background:white; }
        .form-input:focus { outline:none; border-color:var(--accent); box-shadow:0 4px 20px rgba(233,69,96,0.15); transform:translateY(-2px); }
        .form-hint { font-size:0.85rem; color:var(--text-light); margin-top:0.25rem; }
        .btn { width:100%; padding:1.1rem 1.5rem; border:none; border-radius:12px; font-size:1.05rem; font-weight:700; cursor:pointer; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); font-family:'Inter',sans-serif; position:relative; overflow:hidden; }
        .btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent); transition:left 0.5s ease; }
        .btn:hover::before { left:100%; }
        .btn:disabled { opacity:0.7; cursor:not-allowed; }
        .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent-light)); color:white; box-shadow:0 8px 25px rgba(233,69,96,0.3); }
        .btn-primary:hover:not(:disabled) { transform:translateY(-3px); box-shadow:0 12px 35px rgba(233,69,96,0.4); }
        .error-message { background:linear-gradient(135deg,rgba(255,107,107,0.15),rgba(238,90,111,0.15)); color:#d63850; padding:1rem 1.25rem; border-radius:12px; margin-bottom:1.5rem; border-left:4px solid var(--accent); font-weight:600; animation:slideInShake 0.5s ease; }
        .success-message { background:linear-gradient(135deg,rgba(6,214,160,0.15),rgba(4,179,134,0.15)); color:var(--success); padding:1rem 1.25rem; border-radius:12px; margin-bottom:1.5rem; border-left:4px solid var(--success); font-weight:600; animation:slideInShake 0.5s ease; }
        .toggle-form { text-align:center; margin-top:2rem; color:var(--text-light); font-weight:500; }
        .toggle-form button { background:none; border:none; color:var(--accent); font-weight:700; cursor:pointer; transition:all 0.3s ease; position:relative; }
        .toggle-form button::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:2px; background:var(--accent); transition:width 0.3s ease; }
        .toggle-form button:hover::after { width:100%; }

        header { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; padding:1.5rem 0; box-shadow:0 4px 20px rgba(0,0,0,0.15); position:sticky; top:0; z-index:100; }
        .header-content { display:flex; justify-content:space-between; align-items:center; }
        .logo { font-family:'Crimson Pro',serif; font-size:2rem; font-weight:700; display:flex; align-items:center; gap:0.5rem; }
        .user-info { display:flex; align-items:center; gap:1.5rem; }
        .user-name { font-weight:600; font-size:1.05rem; }
        .btn-logout { background:linear-gradient(135deg,var(--accent),var(--accent-light)); color:white; padding:0.75rem 1.75rem; border:none; border-radius:10px; cursor:pointer; font-weight:700; transition:all 0.3s ease; box-shadow:0 4px 15px rgba(233,69,96,0.3); }
        .btn-logout:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(233,69,96,0.4); }
        .btn-add-book { background:linear-gradient(135deg,#06d6a0,#00b386); color:white; padding:0.75rem 1.75rem; border:none; border-radius:10px; cursor:pointer; font-weight:700; transition:all 0.3s ease; box-shadow:0 4px 15px rgba(6,214,160,0.3); margin-right:0.75rem; }
        .btn-add-book:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(6,214,160,0.4); }
        .btn-delete-book { position:absolute; top:8px; right:8px; background:rgba(220,38,38,0.9); color:white; border:none; border-radius:50%; width:32px; height:32px; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; transition:all 0.2s; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
        .btn-delete-book:hover { background:rgb(185,28,28); transform:scale(1.1); }
        .add-book-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; display:flex; align-items:center; justify-content:center; padding:1rem; }
        .add-book-box { background:white; border-radius:20px; padding:2.5rem; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:0 25px 60px rgba(0,0,0,0.4); }
        .add-book-title { font-size:1.5rem; font-weight:800; color:var(--primary); margin-bottom:1.5rem; text-align:center; }
        .add-book-preview { width:100%; display:flex; justify-content:center; margin-bottom:1rem; }
        .add-book-preview img { height:200px; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.2); object-fit:cover; }
        .add-book-preview-placeholder { height:200px; width:130px; border-radius:8px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; font-size:3rem; color:#ccc; border:2px dashed #ddd; }
        .add-book-form-group { margin-bottom:1.2rem; }
        .add-book-label { display:block; font-weight:600; color:var(--primary); margin-bottom:0.4rem; font-size:0.9rem; }
        .add-book-input { width:100%; padding:0.75rem 1rem; border:2px solid #e0e0e0; border-radius:10px; font-size:1rem; transition:border 0.2s; outline:none; box-sizing:border-box; }
        .add-book-input:focus { border-color:var(--purple); }
        .add-book-actions { display:flex; gap:1rem; margin-top:1.5rem; }
        .btn-confirmar { flex:1; background:linear-gradient(135deg,#06d6a0,#00b386); color:white; border:none; padding:1rem; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.3s; }
        .btn-confirmar:hover { transform:translateY(-2px); }
        .btn-confirmar:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .btn-cancelar { flex:1; background:#f0f0f0; color:#666; border:none; padding:1rem; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.3s; }
        .btn-cancelar:hover { background:#e0e0e0; }
        .add-book-status { padding:1rem; border-radius:10px; margin-bottom:1rem; font-size:0.95rem; text-align:center; }
        .add-book-status.validating { background:#e8f4fd; color:#0066cc; border:1px solid #b3d9f7; }
        .add-book-status.success { background:#e8fdf5; color:#006633; border:1px solid #a3e4c7; }
        .add-book-status.error { background:#fdecea; color:#cc0000; border:1px solid #f5b3b3; }
        .add-book-status.corrected { background:#fff8e1; color:#996600; border:1px solid #ffe082; }

        .hero { background:linear-gradient(135deg,rgba(102,126,234,0.08),rgba(118,75,162,0.08)); padding:5rem 0; text-align:center; margin:3rem 0; border-radius:24px; position:relative; overflow:hidden; animation:fadeIn 0.8s ease; }
        .hero::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle,rgba(102,126,234,0.1) 1px,transparent 1px); background-size:30px 30px; animation:moveGrid 30s linear infinite; }
        .hero > * { position:relative; z-index:1; }
        .hero h1 { font-family:'Crimson Pro',serif; font-size:3.5rem; background:linear-gradient(135deg,var(--primary),var(--accent),#764ba2); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:1rem; font-weight:800; }
        .hero p { font-size:1.3rem; color:var(--text); opacity:0.8; font-weight:500; }

        .category-section { margin:4rem 0; }
        .category-header { margin-bottom:2rem; padding-bottom:1rem; border-bottom:3px solid transparent; border-image:linear-gradient(90deg,var(--purple),var(--pink),var(--success)) 1; }
        .category-title { font-family:'Crimson Pro',serif; font-size:2.5rem; background:linear-gradient(135deg,var(--primary),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; font-weight:700; margin-bottom:0.5rem; }
        .category-subtitle { color:var(--text-light); font-size:1.1rem; font-weight:500; }

        .books-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:2.5rem; animation:fadeIn 0.6s ease 0.3s both; }
        .book-card { background:var(--card-bg); border-radius:20px; overflow:hidden; box-shadow:0 8px 30px rgba(0,0,0,0.12); transition:all 0.4s cubic-bezier(0.4,0,0.2,1); border:2px solid transparent; position:relative; }
        .book-card::before { content:''; position:absolute; top:0; left:0; right:0; height:5px; background:linear-gradient(90deg,var(--accent),#764ba2,var(--success)); opacity:0; transition:opacity 0.3s ease; z-index:1; }
        .book-card:hover::before { opacity:1; }
        .book-card:hover { transform:translateY(-12px) scale(1.02); box-shadow:0 20px 50px rgba(102,126,234,0.25); border-color:rgba(102,126,234,0.2); }
        .book-card.unavailable { opacity:0.75; }
        .book-card.unavailable:hover { transform:translateY(-4px) scale(1.005); }

        .book-cover {
            width:100%; height:380px;
            background:linear-gradient(135deg,var(--secondary),var(--accent));
            background-size:cover; background-position:center top;
            position:relative;
        }
        /* Fallback visual para capas que não carregam */
        .book-cover-img {
            width:100%; height:380px;
            object-fit:cover; object-position:center top;
            display:block;
        }
        .book-cover-fallback {
            width:100%; height:380px;
            background:linear-gradient(135deg,var(--primary),var(--purple));
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            color:white; padding:1rem; text-align:center; gap:0.5rem;
        }
        .book-cover-fallback-icon { font-size:3rem; }
        .book-cover-fallback-title { font-family:'Crimson Pro',serif; font-size:1.1rem; font-weight:700; }

        .cover-ribbon { position:absolute; top:18px; right:-28px; background:linear-gradient(135deg,var(--warning),#d97706); color:white; font-size:0.72rem; font-weight:800; padding:0.35rem 2.5rem; transform:rotate(35deg); text-transform:uppercase; letter-spacing:1px; box-shadow:0 3px 12px rgba(245,158,11,0.4); pointer-events:none; }

        .book-info { padding:1.75rem; }
        .book-title { font-family:'Crimson Pro',serif; font-size:1.35rem; font-weight:700; margin-bottom:0.4rem; color:var(--primary); line-height:1.3; }
        .book-author { color:var(--text-light); margin-bottom:1.1rem; font-weight:500; font-size:0.95rem; }
        .book-status { display:inline-flex; align-items:center; gap:0.4rem; padding:0.45rem 1.1rem; border-radius:25px; font-size:0.82rem; font-weight:700; margin-bottom:1.1rem; text-transform:uppercase; letter-spacing:0.5px; }
        .status-available { background:linear-gradient(135deg,rgba(6,214,160,0.15),rgba(4,179,134,0.15)); color:var(--success); border:2px solid var(--success); }
        .status-mine { background:linear-gradient(135deg,rgba(102,126,234,0.15),rgba(118,75,162,0.15)); color:var(--purple); border:2px solid var(--purple); }
        .status-taken { background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(217,119,6,0.15)); color:var(--warning); border:2px solid var(--warning); }
        .status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
        .status-dot-green { background:var(--success); animation:blink 2s infinite; }
        .status-dot-purple { background:var(--purple); }
        .status-dot-orange { background:var(--warning); animation:blink 1.8s infinite; }
        .borrowed-by { font-size:0.8rem; color:var(--text-light); margin-bottom:0.9rem; display:flex; align-items:center; gap:0.4rem; }

        .book-actions { display:flex; flex-direction:column; gap:0.6rem; }
        .btn-borrow, .btn-return, .btn-read, .btn-disabled-book { padding:0.9rem 1.5rem; border:none; border-radius:14px; font-weight:700; cursor:pointer; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); font-family:'Inter',sans-serif; font-size:0.95rem; text-transform:uppercase; letter-spacing:0.5px; }
        .btn-borrow { background:linear-gradient(135deg,var(--success),#04b386); color:white; box-shadow:0 6px 20px rgba(6,214,160,0.3); }
        .btn-borrow:hover { transform:translateY(-3px); box-shadow:0 12px 30px rgba(6,214,160,0.4); }
        .btn-read { background:linear-gradient(135deg,var(--purple),#764ba2); color:white; box-shadow:0 6px 20px rgba(102,126,234,0.3); }
        .btn-read:hover { transform:translateY(-3px); box-shadow:0 12px 30px rgba(102,126,234,0.4); }
        .btn-return { background:linear-gradient(135deg,var(--accent),var(--accent-light)); color:white; box-shadow:0 6px 20px rgba(233,69,96,0.3); }
        .btn-return:hover { transform:translateY(-3px); box-shadow:0 12px 30px rgba(233,69,96,0.4); }
        .btn-disabled-book { background:linear-gradient(135deg,#d1d5db,#9ca3af); color:white; cursor:not-allowed; opacity:0.75; }

        .modal-overlay { position:fixed; inset:0; background:rgba(10,10,20,0.78); backdrop-filter:blur(8px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:1.5rem; animation:fadeIn 0.2s ease; }
        .modal-box { background:white; border-radius:24px; padding:2.5rem 2rem; max-width:400px; width:100%; box-shadow:0 40px 100px rgba(0,0,0,0.4); animation:modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1); text-align:center; position:relative; }
        .modal-close { position:absolute; top:1rem; right:1.25rem; background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text-light); transition:color 0.2s; line-height:1; }
        .modal-close:hover { color:var(--accent); }
        .modal-cover { width:105px; height:148px; border-radius:10px; margin:0 auto 1.25rem; object-fit:cover; object-position:center top; box-shadow:0 12px 35px rgba(0,0,0,0.25); display:block; }
        .modal-cover-fallback { width:105px; height:148px; border-radius:10px; margin:0 auto 1.25rem; background:linear-gradient(135deg,var(--primary),var(--purple)); display:flex; align-items:center; justify-content:center; font-size:3rem; box-shadow:0 12px 35px rgba(0,0,0,0.25); }
        .modal-title { font-family:'Crimson Pro',serif; font-size:1.45rem; font-weight:700; color:var(--primary); margin-bottom:0.3rem; line-height:1.3; }
        .modal-author { color:var(--text-light); font-size:0.92rem; font-weight:500; margin-bottom:1.6rem; }
        .modal-divider { width:50px; height:3px; background:linear-gradient(90deg,var(--accent),var(--purple)); border-radius:2px; margin:0 auto 1.6rem; }
        .btn-access { display:inline-flex; align-items:center; justify-content:center; gap:0.6rem; background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; border:none; border-radius:14px; padding:1rem 2rem; font-size:0.98rem; font-weight:600; cursor:pointer; text-decoration:none; transition:all 0.3s ease; box-shadow:0 8px 25px rgba(26,26,46,0.3); font-family:'Inter',sans-serif; width:100%; letter-spacing:0.3px; }
        .btn-access:hover { transform:translateY(-3px); box-shadow:0 14px 35px rgba(26,26,46,0.4); }

        .db-badge { display:inline-flex; align-items:center; gap:0.4rem; background:rgba(6,214,160,0.15); color:var(--success); border:1px solid var(--success); border-radius:20px; padding:0.3rem 0.8rem; font-size:0.8rem; font-weight:600; margin-top:1rem; }
        .db-badge-dot { width:8px; height:8px; border-radius:50%; background:var(--success); animation:pulse 2s infinite; }

        footer { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; padding:3rem 0 2rem; margin-top:5rem; position:relative; overflow:hidden; }
        footer::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle,rgba(255,255,255,0.05) 1px,transparent 1px); background-size:40px 40px; animation:moveGrid 30s linear infinite; }
        .footer-content { position:relative; z-index:1; text-align:center; }
        .footer-devs { font-family:'Crimson Pro',serif; font-size:1.3rem; margin-bottom:1.5rem; font-weight:600; }
        .footer-names { font-size:1.1rem; margin-bottom:2rem; font-weight:500; }
        .footer-email { display:inline-flex; align-items:center; gap:0.75rem; color:white; text-decoration:none; padding:0.75rem 1.5rem; background:rgba(255,255,255,0.1); border-radius:50px; transition:all 0.3s ease; font-weight:600; border:2px solid rgba(255,255,255,0.2); }
        .footer-email:hover { background:rgba(255,255,255,0.2); transform:translateY(-3px); }
        .email-icon { background:var(--accent); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
        .footer-copyright { margin-top:2rem; padding-top:1.5rem; border-top:1px solid rgba(255,255,255,0.1); font-size:0.9rem; opacity:0.7; }

        @media (max-width:768px) {
            .hero h1 { font-size:2.2rem; }
            .books-grid { grid-template-columns:1fr; }
            .category-title { font-size:2rem; }
            .user-name { display:none; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // Firebase REST API com proxy CORS para funcionar no Neocities
    const FB_PROJECT = 'biblioshare-61f23';
    const FB_KEY     = 'AIzaSyCbbCBP6gT19_7F3mkthPoBDWnnv98XU_Q';
    const FB_BASE    = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;
    const PROXY      = 'https://corsproxy.io/?url=';

    function proxify(url) {
        return PROXY + encodeURIComponent(url);
    }

    // Converte valor JS → formato Firestore REST
    function toFV(val) {
        if (val === null || val === undefined) return { nullValue: null };
        if (typeof val === 'boolean') return { booleanValue: val };
        if (typeof val === 'number') return { integerValue: String(val) };
        if (typeof val === 'object') {
            const fields = {};
            for (const k in val) fields[k] = toFV(val[k]);
            return { mapValue: { fields } };
        }
        return { stringValue: String(val) };
    }

    // Converte valor Firestore REST → JS
    function fromFV(fv) {
        if (!fv) return null;
        if ('stringValue'  in fv) return fv.stringValue;
        if ('integerValue' in fv) return Number(fv.integerValue);
        if ('booleanValue' in fv) return fv.booleanValue;
        if ('nullValue'    in fv) return null;
        if ('mapValue'     in fv) {
            const obj = {};
            for (const k in (fv.mapValue.fields || {}))
                obj[k] = fromFV(fv.mapValue.fields[k]);
            return obj;
        }
        if ('arrayValue'   in fv) return (fv.arrayValue.values || []).map(fromFV);
        return null;
    }

    // Converte documento Firestore REST → objeto JS
    function docToObj(doc) {
        if (!doc || !doc.fields) return null;
        const obj = {};
        for (const k in doc.fields) obj[k] = fromFV(doc.fields[k]);
        obj._docId = (doc.name || '').split('/').pop(); // ID real do documento Firebase
        if (!obj.id) obj.id = obj._docId;
        return obj;
    }

    window.FBDB = {
        // Busca todos os documentos de uma coleção
        async getAll(collection) {
            const r = await fetch(proxify(`${FB_BASE}/${collection}?key=${FB_KEY}`));
            const data = await r.json();
            if (!data.documents) return [];
            return data.documents.map(docToObj);
        },
        // Cria um documento novo
        async add(collection, obj) {
            const fields = {};
            for (const k in obj) if (k !== 'id') fields[k] = toFV(obj[k]);
            const r = await fetch(proxify(`${FB_BASE}/${collection}?key=${FB_KEY}`), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fields })
            });
            const data = await r.json();
            if (!r.ok) throw new Error(data.error?.message || 'Erro ao criar documento');
            return (data.name || '').split('/').pop();
        },
        // Atualiza campos de um documento existente
        async update(collection, docId, obj) {
            const fields = {};
            for (const k in obj) if (k !== 'id') fields[k] = toFV(obj[k]);
            const fieldMask = Object.keys(obj).filter(k => k !== 'id').map(k => `updateMask.fieldPaths=${k}`).join('&');
            const r = await fetch(proxify(`${FB_BASE}/${collection}/${docId}?key=${FB_KEY}&${fieldMask}`), {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fields })
            });
            if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || 'Erro ao atualizar'); }
        },
        // Escuta mudanças em tempo real (polling a cada 5s)
        listenAll(collection, callback) {
            let active = true;
            const poll = async () => {
                if (!active) return;
                try { callback(await this.getAll(collection)); } catch {}
                if (active) setTimeout(poll, 5000);
            };
            poll();
            return () => { active = false; };
        },
        // Deleta um documento
        async delete(collection, docId) {
            const r = await fetch(proxify(`${FB_BASE}/${collection}/${docId}?key=${FB_KEY}`), {
                method: 'DELETE'
            });
            if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || 'Erro ao deletar'); }
        }
    };
</script>

    function AddBookModal({ onClose, onAdd }) {
        const [livroNome, setLivroNome]   = useState('');
        const [pdfUrl, setPdfUrl]         = useState('');
        const [capaUrl, setCapaUrl]       = useState('');
        const [categoria, setCategoria]   = useState('infantil');
        const [status, setStatus]         = useState(null);
        const [loading, setLoading]       = useState(false);
        const [capaOk, setCapaOk]         = useState(false);

        const corrigirNome = (nome) => {
            // Corrige capitalização: primeira letra de cada palavra principal maiúscula
            const minusculas = ['de','do','da','dos','das','e','o','a','os','as','em','por','para','com','um','uma'];
            return nome.trim()
                .toLowerCase()
                .split(' ')
                .map((word, i) => (i === 0 || !minusculas.includes(word))
                    ? word.charAt(0).toUpperCase() + word.slice(1)
                    : word)
                .join(' ');
        };

        const validarEAdicionar = async () => {
            if (!livroNome.trim() || !pdfUrl.trim() || !capaUrl.trim()) {
                setStatus({ type: 'error', msg: '❌ Preencha todos os campos!' });
                return;
            }
            setLoading(true);
            setStatus({ type: 'validating', msg: '🔍 Validando dados...' });
            await new Promise(r => setTimeout(r, 600));

            // Validar nome (mínimo 2 palavras ou 3 chars)
            if (livroNome.trim().length < 2) {
                setStatus({ type: 'error', msg: '❌ Nome do livro muito curto.' });
                setLoading(false); return;
            }

            // Validar URL do PDF
            const pdfValido = /^https?:\/\/.+\.(pdf|PDF)(\?.*)?$/.test(pdfUrl) ||
                              /^https?:\/\/.+pdf.*/i.test(pdfUrl) ||
                              /^https?:\/\/.{10,}/.test(pdfUrl);
            if (!pdfValido) {
                setStatus({ type: 'error', msg: '❌ URL do PDF inválida. Deve começar com http:// ou https://' });
                setLoading(false); return;
            }

            // Validar URL da capa tentando carregar a imagem
            setStatus({ type: 'validating', msg: '🖼️ Verificando imagem da capa...' });
            const capaValida = await new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = capaUrl;
                setTimeout(() => resolve(false), 8000);
            });
            if (!capaValida) {
                setStatus({ type: 'error', msg: '❌ Não foi possível carregar a imagem da capa. Verifique a URL.' });
                setLoading(false); return;
            }

            // Corrigir nome automaticamente
            const nomeCorrigido = corrigirNome(livroNome);
            if (nomeCorrigido !== livroNome.trim()) {
                setLivroNome(nomeCorrigido);
                setStatus({ type: 'corrected', msg: `✏️ Nome corrigido para: "${nomeCorrigido}"` });
                await new Promise(r => setTimeout(r, 1500));
            }

            setStatus({ type: 'success', msg: '✅ Livro validado! Adicionando...' });
            await new Promise(r => setTimeout(r, 700));

            onAdd({
                id: Date.now(),
                title: nomeCorrigido,
                author: '',
                cover: capaUrl,
                bookUrl: pdfUrl,
                _extra: true
            }, categoria);
            onClose();
            setLoading(false);
        };

        return (
            <div className="add-book-overlay" onClick={onClose}>
                <div className="add-book-box" onClick={e => e.stopPropagation()}>
                    <div className="add-book-title">➕ Adicionar Novo Livro</div>

                    <div className="add-book-preview">
                        {capaUrl && capaOk
                            ? <img src={capaUrl} alt="Pré-visualização" onError={() => setCapaOk(false)} />
                            : <div className="add-book-preview-placeholder">🖼️</div>
                        }
                    </div>

                    {status && <div className={`add-book-status ${status.type}`}>{status.msg}</div>}

                    <div className="add-book-form-group">
                        <label className="add-book-label">📖 Nome do Livro *</label>
                        <input className="add-book-input" type="text" placeholder="Ex: Dom Casmurro" value={livroNome} onChange={e => setLivroNome(e.target.value)} />
                    </div>

                    <div className="add-book-form-group">
                        <label className="add-book-label">📄 Link do PDF *</label>
                        <input className="add-book-input" type="url" placeholder="https://..." value={pdfUrl} onChange={e => setPdfUrl(e.target.value)} />
                    </div>

                    <div className="add-book-form-group">
                        <label className="add-book-label">🖼️ URL da Imagem da Capa *</label>
                        <input className="add-book-input" type="url" placeholder="https://..." value={capaUrl} onChange={e => { setCapaUrl(e.target.value); setCapaOk(true); }} />
                    </div>

                    <div className="add-book-form-group">
                        <label className="add-book-label">📚 Categoria</label>
                        <select className="add-book-input" value={categoria} onChange={e => setCategoria(e.target.value)}>
                            <option value="infantil">Infantil / Jovem Adulto</option>
                            <option value="classicos">Clássicos da Literatura</option>
                            <option value="bestsellers">Bestsellers</option>
                        </select>
                    </div>

                    <div className="add-book-actions">
                        <button className="btn-cancelar" onClick={onClose}>Cancelar</button>
                        <button className="btn-confirmar" onClick={validarEAdicionar} disabled={loading}>
                            {loading ? '⏳ Validando...' : '✅ Adicionar Livro'}
                        </button>
                    </div>
                </div>
            </div>
        );
    }


    // APP
    // =============================================
    function App() {
        const [appState, setAppState]         = useState('loading');
        const [currentUser, setCurrentUser]   = useState(null);
        const [showRegister, setShowRegister] = useState(false);
        const [username, setUsername]         = useState('');
        const [password, setPassword]         = useState('');
        const [name, setName]                 = useState('');
        const [email, setEmail]               = useState('');
        const [confirmPassword, setConfirmPassword] = useState('');
        const [error, setError]               = useState('');
        const [success, setSuccess]           = useState('');
        const [myBorrowed, setMyBorrowed]     = useState({});
        const [globalBorrowed, setGlobalBorrowed] = useState({});
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [modalBook, setModalBook]       = useState(null);
        const [showAddBook, setShowAddBook]   = useState(false);
        const [extraBooks, setExtraBooks]     = useState([]);
        const unsubBooksRef = useRef(null);

        const unsubRef = useRef(null);

        const startRealtime = () => {
            if (unsubRef.current) unsubRef.current();
            if (unsubBooksRef.current) unsubBooksRef.current();
            unsubRef.current = DB.listenAllBorrowed(map => setGlobalBorrowed(map));
            unsubBooksRef.current = DB.listenBooks(livros => setExtraBooks(livros));
        };

        useEffect(() => {
            const saved = sessionStorage.getItem('biblioshare-session');
            if (saved) {
                try {
                    const session = JSON.parse(saved);
                    DB.getUser(session.username).then(user => {
                        if (user) {
                            setCurrentUser({ id: user.id, username: user.username, name: user.name });
                            setMyBorrowed(user.borrowedBooks || {});
                            setAppState('app');
                            startRealtime();
                        } else {
                            sessionStorage.removeItem('biblioshare-session');
                            setAppState('login');
                        }
                    }).catch(() => { setCurrentUser(session); setAppState('app'); });
                } catch { setAppState('login'); }
            } else { setAppState('login'); }
            return () => {
                if (unsubRef.current) unsubRef.current();
                if (unsubBooksRef.current) unsubBooksRef.current();
            };
        }, []);

        const withTimeout = (promise, ms = 10000) =>
            Promise.race([promise, new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))]);

        const handleLogin = async (e) => {
            e.preventDefault(); setError(''); setSuccess('');
            if (!username || !password) { setError('❌ Preencha usuário e senha!'); return; }
            setIsSubmitting(true);
            try {
                const user = await withTimeout(DB.getUser(username));
                if (!user) { setError('❌ Usuário não encontrado! Cadastre-se primeiro.'); setIsSubmitting(false); return; }
                if (user.password !== password) { setError('❌ Senha incorreta!'); setIsSubmitting(false); return; }
                const session = { id: user.id, username: user.username, name: user.name };
                sessionStorage.setItem('biblioshare-session', JSON.stringify(session));
                setCurrentUser(session); setMyBorrowed(user.borrowedBooks || {});
                setAppState('app'); startRealtime();
            } catch(err) {
                if (err.message === 'timeout') {
                    setError('❌ Tempo esgotado. Verifique sua conexão ou tente novamente.');
                } else {
                    setError('❌ Erro ao conectar: ' + (err.message || 'verifique sua internet.'));
                }
            }
            finally { setIsSubmitting(false); }
        };

        const handleRegister = async (e) => {
            e.preventDefault(); setError(''); setSuccess('');
            if (!name || !email || !username || !password || !confirmPassword) { setError('❌ Preencha todos os campos!'); return; }
            if (!email.includes('@')) { setError('❌ Email inválido!'); return; }
            if (password.length < 6) { setError('❌ Senha deve ter no mínimo 6 caracteres!'); return; }
            if (password !== confirmPassword) { setError('❌ As senhas não coincidem!'); return; }
            setIsSubmitting(true);
            try {
                if (await withTimeout(DB.getUser(username))) { setError('❌ Este usuário já existe!'); setIsSubmitting(false); return; }
                if (await withTimeout(DB.emailExists(email))) { setError('❌ Este email já está cadastrado!'); setIsSubmitting(false); return; }
                await withTimeout(DB.createUser({ name, email, username, password }));
                setSuccess('✅ Conta criada com sucesso! Faça login.');
                setShowRegister(false);
                setName(''); setEmail(''); setUsername(''); setPassword(''); setConfirmPassword('');
            } catch(err) {
                if (err.message === 'timeout') {
                    setError('❌ Tempo esgotado. Verifique sua conexão ou tente novamente.');
                } else {
                    setError('❌ Erro ao criar conta: ' + (err.message || 'tente novamente.'));
                }
            }
            finally { setIsSubmitting(false); }
        };

        const handleLogout = () => {
            if (unsubRef.current) unsubRef.current();
            if (unsubBooksRef.current) unsubBooksRef.current();
            sessionStorage.removeItem('biblioshare-session');
            setCurrentUser(null); setMyBorrowed({}); setGlobalBorrowed({});
            setUsername(''); setPassword(''); setAppState('login');
        };

        const handleBorrow = async (book) => {
            if (globalBorrowed[book.id]) return;
            const updated = { ...myBorrowed, [book.id]: true };
            setMyBorrowed(updated);
            if (currentUser?.id) { try { await DB.saveBorrowed(currentUser.id, updated); } catch {} }
            setModalBook(book);
        };

        const handleReturn = async (bookId) => {
            const updated = { ...myBorrowed };
            delete updated[bookId];
            setMyBorrowed(updated);
            if (currentUser?.id) { try { await DB.saveBorrowed(currentUser.id, updated); } catch {} }
        };

        const getBookState = (bookId) => {
            if (myBorrowed[bookId]) return 'mine';
            if (globalBorrowed[bookId]) return 'taken';
            return 'available';
        };

        const renderCategory = (key, title, subtitle, books) => (
            <div className="category-section" key={key}>
                <div className="category-header">
                    <h2 className="category-title">{title}</h2>
                    <p className="category-subtitle">{subtitle}</p>
                </div>
                <div className="books-grid">
                    {books.map(book => {
                        const state = getBookState(book.id);
                        const takenBy = globalBorrowed[book.id];
                        return (
                            <div key={book.id} className={`book-card${state === 'taken' ? ' unavailable' : ''}`}>
                                <div style={{position:'relative'}}>
                                    <DynamicCover isbn={book.cover} title={book.title} author={book.author} height={380} />
                                    {state === 'taken' && <div className="cover-ribbon">Indisponível</div>}
                                    {book._extra && currentUser?.username?.toLowerCase() === 'yurigg' && (
                                        <button className="btn-delete-book" title="Excluir livro" onClick={async (e) => {
                                            e.stopPropagation();
                                            if (window.confirm(`Excluir "${book.title}"?`)) {
                                                try {
                                                    await DB.deleteBook(book._docId || book.id);
                                                } catch(err) {
                                                    alert('Erro ao excluir: ' + err.message);
                                                }
                                            }
                                        }}>🗑️</button>
                                    )}
                                </div>
                                <div className="book-info">
                                    <h3 className="book-title">{book.title}</h3>
                                    <p className="book-author">{book.author}</p>
                                    {state === 'available' && (
                                        <div className="book-status status-available">
                                            <span className="status-dot status-dot-green"></span>Disponível
                                        </div>
                                    )}
                                    {state === 'mine' && (
                                        <div className="book-status status-mine">
                                            <span className="status-dot status-dot-purple"></span>Emprestado por mim
                                        </div>
                                    )}
                                    {state === 'taken' && (
                                        <>
                                            <div className="book-status status-taken">
                                                <span className="status-dot status-dot-orange"></span>Indisponível
                                            </div>
                                            <div className="borrowed-by">
                                                <span>👤</span> Com <strong>{takenBy?.name || takenBy?.username}</strong>
                                            </div>
                                        </>
                                    )}
                                    <div className="book-actions">
                                        {state === 'mine' && (
                                            <>
                                                <button className="btn-read" onClick={() => setModalBook(book)}>📖 Ler Livro</button>
                                                <button className="btn-return" onClick={() => handleReturn(book.id)}>↩️ Devolver</button>
                                            </>
                                        )}
                                        {state === 'available' && (
                                            <button className="btn-borrow" onClick={() => handleBorrow(book)}>📚 Emprestar</button>
                                        )}
                                        {state === 'taken' && (
                                            <button className="btn-disabled-book" disabled>🔒 Indisponível no momento</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );

        if (appState === 'loading') return (
            <div className="loading-screen">
                <div className="loading-spinner"></div>
                <div className="loading-text">📚 Carregando BiblioShare...</div>
            </div>
        );

        if (appState === 'login') return (
            <div className="login-screen">
                <div className="login-box">
                    <div className="login-logo">
                        <div className="login-logo-icon">📚</div>
                        <h1 className="login-title">BiblioShare</h1>
                    </div>
                    <p className="login-subtitle">Sistema de Empréstimo de Livros</p>

                    {error && <div className="error-message">{error}</div>}
                    {success && <div className="success-message">{success}</div>}
                    {!showRegister ? (
                        <form onSubmit={handleLogin}>
                            <div className="form-group"><label className="form-label">👤 Usuário</label><input type="text" className="form-input" value={username} onChange={e=>setUsername(e.target.value)} placeholder="Digite seu usuário" /></div>
                            <div className="form-group"><label className="form-label">🔒 Senha</label><input type="password" className="form-input" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Digite sua senha" /></div>
                            <button type="submit" className="btn btn-primary" disabled={isSubmitting}>{isSubmitting ? '⏳ Entrando...' : 'Entrar'}</button>
                            <div className="toggle-form">Não tem conta? <button type="button" onClick={()=>{setShowRegister(true);setError('');setSuccess('');}}>Cadastre-se agora</button></div>
                        </form>
                    ) : (
                        <form onSubmit={handleRegister}>
                            <div className="form-group"><label className="form-label">✨ Nome Completo</label><input type="text" className="form-input" value={name} onChange={e=>setName(e.target.value)} placeholder="Seu nome completo" /></div>
                            <div className="form-group"><label className="form-label">📧 Email</label><input type="email" className="form-input" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" /></div>
                            <div className="form-group"><label className="form-label">👤 Usuário</label><input type="text" className="form-input" value={username} onChange={e=>setUsername(e.target.value)} placeholder="Escolha um usuário" /></div>
                            <div className="form-group"><label className="form-label">🔒 Senha</label><input type="password" className="form-input" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Mínimo 6 caracteres" /><div className="form-hint">Mínimo 6 caracteres</div></div>
                            <div className="form-group"><label className="form-label">🔒 Confirmar Senha</label><input type="password" className="form-input" value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} placeholder="Digite a senha novamente" /></div>
                            <button type="submit" className="btn btn-primary" disabled={isSubmitting}>{isSubmitting ? '⏳ Criando conta...' : '🚀 Criar Conta'}</button>
                            <div className="toggle-form">Já tem conta? <button type="button" onClick={()=>{setShowRegister(false);setError('');setSuccess('');}}>Fazer login</button></div>
                        </form>
                    )}
                </div>
            </div>
        );


        return (
            <>
                {modalBook && <BookModal book={modalBook} onClose={() => setModalBook(null)} />}
                {showAddBook && <AddBookModal onClose={() => setShowAddBook(false)} onAdd={async (livro, cat) => {
                    try {
                        await DB.addBook({ ...livro, categoria: cat });
                    } catch(e) {
                        setExtraBooks(prev => [...prev, { ...livro, categoria: cat }]);
                    }
                }} />}
                <header>
                    <div className="container">
                        <div className="header-content">
                            <div className="logo">📚 BiblioShare</div>
                            <div className="user-info">
                                <span className="user-name">Olá, {currentUser?.name || currentUser?.username}! 👋</span>
                                <button className="btn-add-book" onClick={() => setShowAddBook(true)}>➕ Adicionar Livro</button>
                                <button className="btn-logout" onClick={handleLogout}>Sair</button>
                            </div>
                        </div>
                    </div>
                </header>
                <div className="container">
                    <div className="hero">
                        <h1>Biblioteca Virtual Completa</h1>
                        <p>24 livros incríveis disponíveis para leitura</p>
                    </div>
                    {renderCategory('infantil', '📚 Livros Infantis', 'Aventuras mágicas para os pequenos leitores', [...BOOKS_DATA.infantil, ...extraBooks.filter(b => b.categoria === 'infantil')])}
                    {renderCategory('feminino', '💖 Romances e Ficção Feminina', 'Histórias envolventes de amor, amizade e superação', [...BOOKS_DATA.feminino, ...extraBooks.filter(b => b.categoria === 'feminino')])}
                    {renderCategory('bestsellers', '🏆 Bestsellers e Desenvolvimento', 'Os mais vendidos e livros de crescimento pessoal', [...BOOKS_DATA.bestsellers, ...extraBooks.filter(b => b.categoria === 'bestsellers')])}
                </div>
                <footer>
                    <div className="container">
                        <div className="footer-content">
                            <div className="footer-devs">👨‍💻 Desenvolvido por:</div>
                            <div className="footer-names">Yuri, Vitor, Mari e Felipe</div>
                            <a href="mailto:yurieggers16@gmail.com" className="footer-email">
                                <div className="email-icon">@</div>yurieggers16@gmail.com
                            </a>
                            <div className="footer-copyright">BiblioShare © 2026 • Feito com ❤️ para amantes de livros</div>
                        </div>
                    </div>
                </footer>
            </>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
