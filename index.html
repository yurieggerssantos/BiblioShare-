<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioShare - Sistema de Empréstimo de Livros</title>
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React e Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --accent-light: #ff6b6b;
            --success: #06d6a0;
            --bg: #faf9f6;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ANIMAÇÕES */
        @keyframes slideUpBounce {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            60% {
                transform: translateY(-5px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes moveGrid {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(30px, 30px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideInShake {
            0% {
                opacity: 0;
                transform: translateX(-20px);
            }
            60% {
                transform: translateX(5px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* LOGIN SCREEN */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .login-screen::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: moveGrid 20s linear infinite;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
            position: relative;
            animation: slideUpBounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        .login-logo-icon {
            font-size: 4rem;
            margin-bottom: 0.5rem;
        }

        .login-title {
            font-family: 'Crimson Pro', serif;
            font-size: 2.8rem;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent), #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            background: white;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.15);
            transform: translateY(-2px);
        }

        .form-hint {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        .btn {
            width: 100%;
            padding: 1.1rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .error-message {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.15), rgba(238, 90, 111, 0.15));
            color: #d63850;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--accent);
            font-weight: 600;
            animation: slideInShake 0.5s ease;
        }

        .success-message {
            background: linear-gradient(135deg, rgba(6, 214, 160, 0.15), rgba(4, 179, 134, 0.15));
            color: var(--success);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--success);
            font-weight: 600;
            animation: slideInShake 0.5s ease;
        }

        .toggle-form {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .toggle-form button {
            background: none;
            border: none;
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }

        .toggle-form button::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .toggle-form button:hover::after {
            width: 100%;
        }

        .toggle-form button:hover {
            color: var(--accent-light);
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1.5rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Crimson Pro', serif;
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .user-name {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .btn-logout {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            padding: 0.75rem 1.75rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(118, 75, 162, 0.08));
            padding: 5rem 0;
            text-align: center;
            margin: 3rem 0;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: moveGrid 30s linear infinite;
        }

        .hero > * {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent), #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            font-weight: 800;
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--text);
            opacity: 0.8;
            font-weight: 500;
        }

        /* BOOKS GRID */
        .books-section {
            margin: 4rem 0;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
            animation: fadeIn 0.6s ease 0.3s both;
        }

        .book-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
        }

        .book-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--accent), #764ba2, var(--success));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .book-card:hover::before {
            opacity: 1;
        }

        .book-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.25);
            border-color: rgba(102, 126, 234, 0.2);
        }

        .book-cover {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Crimson Pro', serif;
            font-size: 1.6rem;
            color: white;
            text-align: center;
            padding: 2rem;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .book-cover::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.3) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .book-card:hover .book-cover::after {
            opacity: 1;
        }

        .book-info {
            padding: 2rem;
            background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(250,249,246,0.5) 100%);
        }

        .book-title {
            font-family: 'Crimson Pro', serif;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--primary);
            line-height: 1.3;
        }

        .book-author {
            color: var(--text-light);
            margin-bottom: 1.25rem;
            font-weight: 500;
            font-size: 1rem;
        }

        .book-status {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .book-status::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .book-card:hover .book-status::before {
            left: 100%;
        }

        .status-available {
            background: linear-gradient(135deg, rgba(6, 214, 160, 0.2), rgba(4, 179, 134, 0.2));
            color: var(--success);
            border: 2px solid var(--success);
            box-shadow: 0 4px 15px rgba(6, 214, 160, 0.2);
        }

        .status-borrowed {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.2), rgba(238, 90, 111, 0.2));
            color: var(--accent);
            border: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.2);
        }

        .book-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn-borrow, .btn-return, .btn-read {
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-borrow::before, .btn-return::before, .btn-read::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-borrow:hover::before, .btn-return:hover::before, .btn-read:hover::before {
            left: 100%;
        }

        .btn-borrow {
            background: linear-gradient(135deg, var(--success), #04b386);
            color: white;
            box-shadow: 0 6px 20px rgba(6, 214, 160, 0.3);
        }

        .btn-borrow:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(6, 214, 160, 0.4);
        }

        .btn-read {
            background: linear-gradient(135deg, #06d6a0, #04b386);
            color: white;
            box-shadow: 0 6px 20px rgba(6, 214, 160, 0.3);
        }

        .btn-read:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(6, 214, 160, 0.4);
        }

        .btn-return {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.3);
        }

        .btn-return:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(233, 69, 96, 0.4);
        }

        /* FOOTER */
        footer {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 3rem 0 2rem;
            margin-top: 5rem;
            position: relative;
            overflow: hidden;
        }

        footer::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveGrid 30s linear infinite;
        }

        .footer-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .footer-devs {
            font-family: 'Crimson Pro', serif;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .footer-names {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .footer-email {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            transition: all 0.3s ease;
            font-weight: 600;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .footer-email:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.3);
            border-color: var(--accent-light);
        }

        .email-icon {
            background: var(--accent);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .footer-email:hover .email-icon {
            background: var(--accent-light);
            transform: rotate(360deg) scale(1.1);
        }

        .footer-copyright {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .books-grid {
                grid-template-columns: 1fr;
            }

            .login-title {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ===================================
        // DADOS DOS LIVROS
        // ===================================
        const BOOKS_DATA = [
            {
                id: 1,
                title: 'Dom Casmurro',
                author: 'Machado de Assis',
                cover: 'https://m.media-amazon.com/images/I/51rQVno0R4L._SY344_BO1,204,203,200_.jpg',
                pdfUrl: 'http://www.dominiopublico.gov.br/download/texto/bv000180.pdf'
            },
            {
                id: 2,
                title: 'O Cortiço',
                author: 'Aluísio Azevedo',
                cover: 'https://m.media-amazon.com/images/I/51xH0VKgTqL._SY344_BO1,204,203,200_.jpg',
                pdfUrl: 'http://www.dominiopublico.gov.br/download/texto/bv000015.pdf'
            },
            {
                id: 3,
                title: 'Memórias Póstumas de Brás Cubas',
                author: 'Machado de Assis',
                cover: 'https://m.media-amazon.com/images/I/51EO7EYqWWL._SY344_BO1,204,203,200_.jpg',
                pdfUrl: 'http://www.dominiopublico.gov.br/download/texto/bv000181.pdf'
            },
            {
                id: 4,
                title: 'Iracema',
                author: 'José de Alencar',
                cover: 'https://m.media-amazon.com/images/I/51yVyT5zXxL._SY344_BO1,204,203,200_.jpg',
                pdfUrl: 'http://www.dominiopublico.gov.br/download/texto/bv000136.pdf'
            },
            {
                id: 5,
                title: 'O Alienista',
                author: 'Machado de Assis',
                cover: 'https://m.media-amazon.com/images/I/51a+TfhGU4L._SY344_BO1,204,203,200_.jpg',
                pdfUrl: 'http://www.dominiopublico.gov.br/download/texto/bv000231.pdf'
            },
            {
                id: 6,
                title: 'Senhora',
                author: 'José de Alencar',
                cover: 'https://m.media-amazon.com/images/I/51zFTkgvpEL._SY344_BO1,204,203,200_.jpg',
                pdfUrl: 'http://www.dominiopublico.gov.br/download/texto/bn000117.pdf'
            },
            {
                id: 7,
                title: 'Vidas Secas',
                author: 'Graciliano Ramos',
                cover: 'https://m.media-amazon.com/images/I/51YBiP2sITL._SY344_BO1,204,203,200_.jpg',
                pdfUrl: 'http://www.dominiopublico.gov.br/download/texto/bn000158.pdf'
            },
            {
                id: 8,
                title: 'A Escrava Isaura',
                author: 'Bernardo Guimarães',
                cover: 'https://m.media-amazon.com/images/I/51x0qwrPLbL._SY344_BO1,204,203,200_.jpg',
                pdfUrl: 'http://www.dominiopublico.gov.br/download/texto/bn000001.pdf'
            }
        ];

        // ===================================
        // COMPONENTE PRINCIPAL
        // ===================================
        function App() {
            // Estados
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUser, setCurrentUser] = useState('');
            const [showRegister, setShowRegister] = useState(false);
            
            // Estados do formulário
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            
            // Estados de mensagens
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            
            // Estados dos livros
            const [borrowedBooks, setBorrowedBooks] = useState({});

            // Carregar dados do localStorage
            useEffect(() => {
                const savedUser = localStorage.getItem('biblioshare-current-user');
                if (savedUser) {
                    setIsLoggedIn(true);
                    setCurrentUser(savedUser);
                    const savedBorrowed = localStorage.getItem(`biblioshare-borrowed-${savedUser}`);
                    if (savedBorrowed) {
                        setBorrowedBooks(JSON.parse(savedBorrowed));
                    }
                }
            }, []);

            // Salvar livros emprestados
            useEffect(() => {
                if (currentUser) {
                    localStorage.setItem(`biblioshare-borrowed-${currentUser}`, JSON.stringify(borrowedBooks));
                }
            }, [borrowedBooks, currentUser]);

            // ===================================
            // FUNÇÕES DE LOGIN/CADASTRO
            // ===================================
            
            const handleLogin = (e) => {
                e.preventDefault();
                setError('');
                setSuccess('');

                if (!username || !password) {
                    setError('❌ Preencha usuário e senha!');
                    return;
                }

                // Buscar usuário no localStorage
                const users = JSON.parse(localStorage.getItem('biblioshare-users') || '[]');
                const user = users.find(u => u.username === username);

                if (!user) {
                    setError('❌ Usuário não encontrado! Cadastre-se primeiro.');
                    return;
                }

                if (user.password !== password) {
                    setError('❌ Senha incorreta!');
                    return;
                }

                // Login bem-sucedido
                setIsLoggedIn(true);
                setCurrentUser(username);
                localStorage.setItem('biblioshare-current-user', username);
                
                // Carregar livros emprestados
                const savedBorrowed = localStorage.getItem(`biblioshare-borrowed-${username}`);
                if (savedBorrowed) {
                    setBorrowedBooks(JSON.parse(savedBorrowed));
                }

                console.log('✅ Login realizado:', username);
            };

            const handleRegister = (e) => {
                e.preventDefault();
                setError('');
                setSuccess('');

                // Validações
                if (!name || !email || !username || !password || !confirmPassword) {
                    setError('❌ Preencha todos os campos!');
                    return;
                }

                if (!email.includes('@')) {
                    setError('❌ Email inválido!');
                    return;
                }

                if (password.length < 6) {
                    setError('❌ Senha deve ter no mínimo 6 caracteres!');
                    return;
                }

                if (password !== confirmPassword) {
                    setError('❌ As senhas não coincidem!');
                    return;
                }

                // Verificar se usuário já existe
                const users = JSON.parse(localStorage.getItem('biblioshare-users') || '[]');
                if (users.find(u => u.username === username)) {
                    setError('❌ Este usuário já existe!');
                    return;
                }

                // Criar novo usuário
                const newUser = { name, email, username, password };
                users.push(newUser);
                localStorage.setItem('biblioshare-users', JSON.stringify(users));

                setSuccess('✅ Conta criada com sucesso! Faça login.');
                setShowRegister(false);
                
                // Limpar campos
                setName('');
                setEmail('');
                setUsername('');
                setPassword('');
                setConfirmPassword('');

                console.log('✅ Usuário cadastrado:', username);
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUser('');
                setBorrowedBooks({});
                localStorage.removeItem('biblioshare-current-user');
                console.log('✅ Logout realizado');
            };

            // ===================================
            // FUNÇÕES DOS LIVROS
            // ===================================
            
            const handleBorrow = (bookId) => {
                setBorrowedBooks(prev => ({
                    ...prev,
                    [bookId]: true
                }));
                console.log('📖 Livro emprestado:', bookId);
            };

            const handleReturn = (bookId) => {
                setBorrowedBooks(prev => {
                    const newBorrowed = { ...prev };
                    delete newBorrowed[bookId];
                    return newBorrowed;
                });
                console.log('📚 Livro devolvido:', bookId);
            };

            const openPDF = (url) => {
                window.open(url, '_blank');
            };

            // ===================================
            // RENDERIZAÇÃO
            // ===================================

            // Tela de Login
            if (!isLoggedIn) {
                return (
                    <div className="login-screen">
                        <div className="login-box">
                            <div className="login-logo">
                                <div className="login-logo-icon">📚</div>
                                <h1 className="login-title">BiblioShare</h1>
                            </div>
                            <p className="login-subtitle">Sistema de Empréstimo de Livros</p>

                            {error && <div className="error-message">{error}</div>}
                            {success && <div className="success-message">{success}</div>}

                            {!showRegister ? (
                                // FORMULÁRIO DE LOGIN
                                <form onSubmit={handleLogin}>
                                    <div className="form-group">
                                        <label className="form-label">👤 Usuário</label>
                                        <input
                                            type="text"
                                            className="form-input"
                                            value={username}
                                            onChange={(e) => setUsername(e.target.value)}
                                            placeholder="Digite seu usuário"
                                        />
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">🔒 Senha</label>
                                        <input
                                            type="password"
                                            className="form-input"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            placeholder="Digite sua senha"
                                        />
                                    </div>

                                    <button type="submit" className="btn btn-primary">
                                        Entrar
                                    </button>

                                    <div className="toggle-form">
                                        Não tem conta? <button type="button" onClick={() => { setShowRegister(true); setError(''); setSuccess(''); }}>Cadastre-se agora</button>
                                    </div>
                                </form>
                            ) : (
                                // FORMULÁRIO DE CADASTRO
                                <form onSubmit={handleRegister}>
                                    <div className="form-group">
                                        <label className="form-label">✨ Nome Completo</label>
                                        <input
                                            type="text"
                                            className="form-input"
                                            value={name}
                                            onChange={(e) => setName(e.target.value)}
                                            placeholder="Seu nome completo"
                                        />
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">📧 Email</label>
                                        <input
                                            type="email"
                                            className="form-input"
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            placeholder="seu@email.com"
                                        />
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">👤 Usuário</label>
                                        <input
                                            type="text"
                                            className="form-input"
                                            value={username}
                                            onChange={(e) => setUsername(e.target.value)}
                                            placeholder="Escolha um usuário"
                                        />
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">🔒 Senha</label>
                                        <input
                                            type="password"
                                            className="form-input"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            placeholder="Mínimo 6 caracteres"
                                        />
                                        <div className="form-hint">Mínimo 6 caracteres</div>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">🔒 Confirmar Senha</label>
                                        <input
                                            type="password"
                                            className="form-input"
                                            value={confirmPassword}
                                            onChange={(e) => setConfirmPassword(e.target.value)}
                                            placeholder="Digite a senha novamente"
                                        />
                                    </div>

                                    <button type="submit" className="btn btn-primary">
                                        🚀 Criar Conta
                                    </button>

                                    <div className="toggle-form">
                                        Já tem conta? <button type="button" onClick={() => { setShowRegister(false); setError(''); setSuccess(''); }}>Fazer login</button>
                                    </div>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            // Tela Principal (logado)
            return (
                <>
                    <header>
                        <div className="container">
                            <div className="header-content">
                                <div className="logo">📚 BiblioShare</div>
                                <div className="user-info">
                                    <span className="user-name">Olá, {currentUser}! 👋</span>
                                    <button className="btn-logout" onClick={handleLogout}>
                                        Sair
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="container">
                        <div className="hero">
                            <h1>Biblioteca Virtual</h1>
                            <p>Explore nossa coleção de clássicos da literatura brasileira</p>
                        </div>

                        <div className="books-section">
                            <div className="books-grid">
                                {BOOKS_DATA.map(book => (
                                    <div key={book.id} className="book-card">
                                        <div 
                                            className="book-cover"
                                            style={{ backgroundImage: `url(${book.cover})` }}
                                        >
                                            {!book.cover && <span>{book.title}</span>}
                                        </div>
                                        <div className="book-info">
                                            <h3 className="book-title">{book.title}</h3>
                                            <p className="book-author">{book.author}</p>
                                            
                                            <div className={`book-status ${borrowedBooks[book.id] ? 'status-borrowed' : 'status-available'}`}>
                                                {borrowedBooks[book.id] ? '📖 Emprestado' : '✅ Disponível'}
                                            </div>

                                            <div className="book-actions">
                                                {borrowedBooks[book.id] ? (
                                                    <>
                                                        <button 
                                                            className="btn-read" 
                                                            onClick={() => openPDF(book.pdfUrl)}
                                                        >
                                                            📖 Ler Livro
                                                        </button>
                                                        <button 
                                                            className="btn-return" 
                                                            onClick={() => handleReturn(book.id)}
                                                        >
                                                            ↩️ Devolver
                                                        </button>
                                                    </>
                                                ) : (
                                                    <button 
                                                        className="btn-borrow" 
                                                        onClick={() => handleBorrow(book.id)}
                                                    >
                                                        📚 Emprestar
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <footer>
                        <div className="container">
                            <div className="footer-content">
                                <div className="footer-devs">
                                    👨‍💻 Desenvolvido por:
                                </div>
                                <div className="footer-names">
                                    Yuri, Vitor, Mari e Felipe
                                </div>
                                <a href="mailto:yurieggers16@gmail.com" className="footer-email">
                                    <div className="email-icon">@</div>
                                    yurieggers16@gmail.com
                                </a>
                                <div className="footer-copyright">
                                    BiblioShare © 2026 • Feito com ❤️ para amantes de livros
                                </div>
                            </div>
                        </div>
                    </footer>
                </>
            );
        }

        // Renderizar app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
